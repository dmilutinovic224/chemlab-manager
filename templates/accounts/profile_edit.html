{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h3>Uredi profil</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Ime:</label>
                        <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Prezime:</label>
                        <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email:</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Institucija:</label>
                        <input type="text" name="institution" class="form-control" value="{{ user.institution }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Telefon:</label>
                        <input type="text" name="phone_number" class="form-control" value="{{ user.phone_number }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Bio:</label>
                        <textarea name="bio" class="form-control" rows="3">{{ user.bio }}</textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-warning">Sačuvaj</button>
                    <a href="{% url 'profile' %}" class="btn btn-secondary">Odustani</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
