{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h3>Dodaj komentar za "{{ compound.name }}"</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        {{ form.text }}
                    </div>
                    
                    <button type="submit" class="btn btn-info">Objavi komentar</button>
                    <a href="{% url 'compound_detail' compound.pk %}" class="btn btn-secondary">Nazad na jedinjenja</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
