{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h3>Dodaj belešku za "{{ experiment.title }}"</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">{{ form.note.label }}</label>
                        {{ form.note }}
                        {% if form.note.help_text %}
                            <small class="text-muted">{{ form.note.help_text }}</small>
                        {% endif %}
                    </div>
                    
                    <button type="submit" class="btn btn-info">Dodaj belešku</button>
                    <a href="{% url 'experiment_detail' experiment.pk %}" class="btn btn-secondary">Nazad</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
