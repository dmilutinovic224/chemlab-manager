{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3>Potvrda brisanja</h3>
            </div>
            <div class="card-body">
                <p>Da li ste sigurni da želite obrisati eksperiment <strong>"{{ object.title }}"</strong>?</p>
                <p class="text-danger">Ova radnja je nepovratna! Sve beleške vezane za ovaj eksperiment biže obrisane.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Da, obriši</button>
                    <a href="{% url 'experiment_detail' object.pk %}" class="btn btn-secondary">Odustani</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
