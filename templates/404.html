{% extedds 'base.html' %}

{% block title %} Nepostojeca stranica - 404 {% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="bi bi-emoji-frown" style="font-size: 5rem; color: #6c757d;"></i>
                    </div>
                    <h1 class="display-1 fw-bold text-muted">404</h1>
                    <h2 class="mb-4">Stranica nije nadjena</h2>
                    <p class="lead mb-4">
                        stranica ne postoji ili je premestena
                    </p>
                    <p class="text-muted mb-4">
                        proverite url adresu
                    </p>
                    <div class="mt-4">
                        <a href="{% url 'compound_list' %}" class="btn btn-primary btn-lg me-2">
                            <i class="bi bi-house-door">pocetna</i>
                        </a>
                        <button onclick="history.back()" class="btn btn-secondary btn-lg">
                            <i class="bi bi-arrow-left">nazad</i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
