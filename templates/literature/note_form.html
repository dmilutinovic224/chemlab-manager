{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h3>Dodaj belešku za "{{ literature.title }}"</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Beleška:</label>
                        <textarea name="note" class="form-control" rows="4" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-info">Dodaj belešku</button>
                    <a href="{% url 'literature_detail' literature.pk %}" class="btn btn-secondary">Nazad</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
