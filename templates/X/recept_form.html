{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3>{% if object %}Uredi recept{% else %}Dodaj novi recept{% endif %}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Naziv recepta:</label>
                        <input type="text" name="naziv" class="form-control" value="{{ object.naziv|default:'' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Opis:</label>
                        <textarea name="opis" class="form-control" rows="4" required>{{ object.opis|default:'' }}</textarea>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="javno" class="form-check-input" id="javno">
                            {% if object.javno %}checked{% endif %}
                        <label class="form-check-label" for="javno">Javno dostupan</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Spremi recept</button>
                    <a href="{% if object %}{% url 'recept_detail' object.pk%}{% else %}{% url 'recept_list' %}{% endif %}" class="btn btn-secondary">Odustani</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
