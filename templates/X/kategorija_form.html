{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header bg-warning">
                <h3>Dodaj novu kategoriju</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Naziv kategorije:</label>
                        <input type="text" name="naziv" class="form-control" required>
                        <small class="text-muted">Npr. Italijanska kuhinja, Deserti, Vegetarijansko...</small>
                    </div>
                    
                    <button type="submit" class="btn btn-warning">Dodaj kategoriju</button>
                    <a href="{% url 'recept_list' %}" class="btn btn-secondary">Nazad</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
