{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h3>Dodaj belešku za seriju "{{ batch.batch_number }}"</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.note }}
                    </div>
                    <button type="submit" class="btn btn-info">Dodaj belešku</button>
                    <a href="{% url 'batch_detail' batch.pk %}" class="btn btn-secondary">Nazad</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
