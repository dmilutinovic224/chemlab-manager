{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3>Potvrda brisanja dobavljača</h3>
            </div>
            <div class="card-body">
                <p>Jeste li sigurni da želite obrisati dobavljača <strong>"{{ supplier.name }}"</strong>?</p>
                <p class="text-danger">Ova radnja je nepovratna!</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Da</button>
                    <a href="{% url 'supplier_detail' supplier.pk %}" class="btn btn-secondary">Odustani</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
